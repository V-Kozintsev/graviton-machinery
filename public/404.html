<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>GRAVITON - перенаправление</title>
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var location = window.location;
        var base = location.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');
        var route = location.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~');
        var search = location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '';
        location.replace(location.protocol + '//' + location.hostname + (location.port ? ':' + location.port : '') + base + '/?/' + route + search + location.hash);
      }());
    </script>
  </head>
  <body></body>
</html>
